<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SVGInject — Performance Tests</title>
  <link rel="stylesheet" href="css/test_helper.css" />
  <link rel="stylesheet" href="css/test_performance.css" />
  <script src="js/svg-inject.js"></script>
  <script src="js/test_helper.js"></script>
  <script src="js/test_performance.js"></script>
</head>
<body id="performance-tests">

  <h1>Performance Tests</h1>
  <p>Measures injection time per SVG. Shows the best result out of n repetitions.</p>

  <div id="header">
    <div id="tools">
      <div class="tool">
        <label>Sample Size</label>
        <input type="number" id="sample-size" min="1" max="1000" value="100" />
      </div>
      <div class="tool">
        <label>Repetitions</label>
        <input type="number" id="repetitions" min="1" max="50" value="10" />
      </div>
      <div class="tool">
        <label>SVG Size (px)</label>
        <input type="number" id="svg-size" min="16" max="4096" value="128" />
      </div>
      <div class="tool">
        <fieldset>
          <legend>Cache Level</legend>
          <div>
            <input type="radio" id="cache-full" name="cache-level" value="cacheFull" checked />
            <label for="cache-full">Full Caching</label>
          </div>
          <div>
            <input type="radio" id="cache-disable-svg-inject" name="cache-level" value="cacheDisableSVGInject" />
            <label for="cache-disable-svg-inject">Disable SVGInject Caching</label>
          </div>
          <div>
            <input type="radio" id="cache-disable-browser" name="cache-level" value="cacheDisableBrowser" />
            <label for="cache-disable-browser">Disable Browser Caching</label>
          </div>
        </fieldset>
      </div>
      <div class="tool">
        <input type="checkbox" id="use-onload-attribute" checked />
        <label for="use-onload-attribute">Use onload attribute</label>
      </div>
      <div class="tool">
        <button type="button" onclick="run()">Run Tests</button>
      </div>
    </div>
    <div id="running">Running tests...</div>
  </div>

  <div style="display: flex;">
    <div style="flex: 1 0 0; padding: 0 12px; border-right: 1px solid #eee;">
      <div id="results"></div>
    </div>
    <div style="flex: 1 0 0; padding: 0 0 0 12px;">
      <div id="render-container"></div>
    </div>
  </div>
  <div id="build" style="display: none;"></div>

  <script src="js/xhr-check.js"></script>
</body>
</html>
