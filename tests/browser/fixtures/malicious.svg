<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" onload="window.__xss=true">
  <script>window.__xss=true;</script>
  <foreignObject width="100" height="100">
    <body xmlns="http://www.w3.org/1999/xhtml">
      <img src="x" onerror="window.__xss=true"/>
    </body>
  </foreignObject>
  <rect width="100" height="100" fill="red" onclick="window.__xss=true"/>
  <a href="javascript:window.__xss=true"><text>click me</text></a>
</svg>
